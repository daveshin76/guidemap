<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LEXICON BLASTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00f5ff;
            --pink: #ff006e;
            --amber: #ffbe0b;
            --green: #06d6a0;
            --bg: #050a12;
            --panel: rgba(0, 10, 20, 0.92);
            --border: rgba(0, 245, 255, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
        }

        /* ── BACKGROUND ── */
        #bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridScroll 6s linear infinite;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes gridScroll {
            0%   { background-position: 0 0; }
            100% { background-position: 0 40px; }
        }
        #scanlines {
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                to bottom,
                transparent,
                transparent 3px,
                rgba(0,0,0,0.18) 3px,
                rgba(0,0,0,0.18) 4px
            );
            pointer-events: none;
            z-index: 1;
        }
        #vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
            pointer-events: none;
            z-index: 2;
        }

        /* ── GAME SCREEN ── */
        #game-screen {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            z-index: 10;
        }

        /* ── HUD ── */
        #hud {
            position: absolute;
            top: 0;
            width: 100%;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%);
            border-bottom: 1px solid var(--border);
        }
        #hud::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            animation: scanH 3s ease-in-out infinite;
        }
        @keyframes scanH {
            0%,100% { opacity: 0.3; }
            50%      { opacity: 1; }
        }

        .hud-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }
        .hud-label {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.45rem;
            color: rgba(255,255,255,0.35);
            letter-spacing: 2px;
        }
        #score-val {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--cyan);
            text-shadow: 0 0 20px var(--cyan), 0 0 40px rgba(0,245,255,0.4);
            letter-spacing: 2px;
        }
        #life-val {
            font-size: 1.1rem;
            letter-spacing: 4px;
            filter: drop-shadow(0 0 6px #ff006e);
        }
        #combo-val {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.55rem;
            color: var(--amber);
            text-shadow: 0 0 10px var(--amber);
            min-width: 60px;
            text-align: center;
        }

        /* ── TITLE LOGO ── */
        #logo {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.55rem;
            color: var(--cyan);
            letter-spacing: 1px;
            text-shadow: 0 0 10px var(--cyan);
            line-height: 1.6;
            text-align: center;
        }

        /* ── ENEMY ── */
        .enemy {
            position: absolute;
            width: 160px;
            text-align: center;
            transform: translateX(-50%);
            z-index: 50;
            filter: drop-shadow(0 0 12px var(--cyan));
        }
        .enemy-inner {
            position: relative;
        }
        .enemy-box {
            background: linear-gradient(135deg, rgba(0,20,35,0.97) 0%, rgba(0,10,25,0.97) 100%);
            border: 1px solid var(--cyan);
            border-radius: 6px;
            padding: 12px 14px 10px;
            position: relative;
            overflow: hidden;
        }
        .enemy-box::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0,245,255,0.08) 0%, transparent 60%);
        }
        .enemy-box::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
        }
        .corner {
            position: absolute;
            width: 8px; height: 8px;
            border-color: var(--cyan);
            border-style: solid;
        }
        .corner-tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
        .corner-tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
        .corner-bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
        .corner-br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

        .target-type {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            display: inline-block;
            padding: 5px 12px;
            border-radius: 4px;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        .type-syn  { background: rgba(6,214,160,0.2); color: #00ffcc;  border: 1px solid rgba(6,214,160,0.6); text-shadow: 0 0 8px rgba(6,214,160,0.8); }
        .type-ant  { background: rgba(255,0,110,0.2);  color: #ff4da6;  border: 1px solid rgba(255,0,110,0.6); text-shadow: 0 0 8px rgba(255,0,110,0.8); }

        .target-word {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: #fff;
            display: block;
            letter-spacing: 1px;
        }

        /* enemy health bar */
        .enemy-bar-wrap {
            height: 3px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        .enemy-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--cyan), var(--pink));
            border-radius: 2px;
            width: 100%;
            transform-origin: left;
            animation: barDrain linear forwards;
        }

        /* ── CONTROLLER ── */
        #controller {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 36%;
            padding: 12px 14px 16px;
            box-sizing: border-box;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 10px;
            z-index: 200;
            background: linear-gradient(to top, rgba(0,0,0,0.98) 60%, transparent 100%);
            border-top: 1px solid var(--border);
        }
        #controller::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--cyan) 30%, var(--pink) 70%, transparent);
        }

        .choice-btn {
            background: linear-gradient(145deg, #0d1f2d 0%, #081520 100%);
            border: 1px solid rgba(0,245,255,0.25);
            color: #c8e8f0;
            border-radius: 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            transition: all 0.08s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
        }
        .choice-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,245,255,0.1), transparent);
            transition: left 0.3s ease;
        }
        .choice-btn:hover::before { left: 100%; }
        .choice-btn:active {
            background: linear-gradient(145deg, rgba(0,245,255,0.2), rgba(0,245,255,0.05));
            border-color: var(--cyan);
            color: var(--cyan);
            transform: scale(0.96);
            box-shadow: 0 0 20px rgba(0,245,255,0.3), inset 0 0 10px rgba(0,245,255,0.1);
        }
        .choice-btn.correct {
            background: linear-gradient(145deg, rgba(6,214,160,0.25), rgba(6,214,160,0.1));
            border-color: var(--green);
            color: var(--green);
            box-shadow: 0 0 25px rgba(6,214,160,0.4);
        }
        .choice-btn.wrong {
            background: linear-gradient(145deg, rgba(255,0,110,0.25), rgba(255,0,110,0.1));
            border-color: var(--pink);
            color: var(--pink);
            box-shadow: 0 0 25px rgba(255,0,110,0.4);
        }

        /* ── OVERLAY ── */
        #overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.92);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            gap: 20px;
        }
        #overlay-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.3rem;
            color: var(--pink);
            text-shadow: 0 0 30px var(--pink), 0 0 60px rgba(255,0,110,0.4);
            text-align: center;
            line-height: 1.8;
            animation: glitch 2s ease-in-out infinite;
        }
        @keyframes glitch {
            0%,90%,100% { text-shadow: 0 0 30px var(--pink), 0 0 60px rgba(255,0,110,0.4); transform: none; }
            92%  { transform: translate(-2px, 0); text-shadow: 2px 0 var(--cyan), 0 0 30px var(--pink); }
            94%  { transform: translate(2px, 0);  text-shadow: -2px 0 var(--amber), 0 0 30px var(--pink); }
            96%  { transform: none; }
        }
        .overlay-stat {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            color: rgba(255,255,255,0.6);
            letter-spacing: 2px;
        }
        .overlay-stat span {
            color: var(--cyan);
            font-size: 1.6rem;
            font-weight: 900;
            text-shadow: 0 0 15px var(--cyan);
        }
        #restart-btn {
            margin-top: 10px;
            padding: 14px 36px;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
            background: transparent;
            border: 2px solid var(--cyan);
            color: var(--cyan);
            border-radius: 6px;
            cursor: pointer;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--cyan);
            box-shadow: 0 0 20px rgba(0,245,255,0.2), inset 0 0 20px rgba(0,245,255,0.05);
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        #restart-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0,245,255,0.1), transparent);
            opacity: 0;
            transition: opacity 0.2s;
        }
        #restart-btn:hover {
            background: rgba(0,245,255,0.1);
            box-shadow: 0 0 40px rgba(0,245,255,0.4);
        }
        #restart-btn:hover::after { opacity: 1; }

        /* ── PARTICLES ── */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 60;
            animation: particleFly 0.6s ease-out forwards;
        }
        @keyframes particleFly {
            0%   { opacity: 1; transform: translate(0,0) scale(1); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
        }

        /* ── FLOATING SCORE ── */
        .float-score {
            position: absolute;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
            color: var(--amber);
            text-shadow: 0 0 10px var(--amber);
            pointer-events: none;
            z-index: 60;
            animation: floatUp 0.8s ease-out forwards;
        }
        @keyframes floatUp {
            0%   { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-50px); }
        }

        /* ── GLITCH SCREEN FLASH ── */
        #flash {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 500;
            opacity: 0;
        }
        #flash.red  { background: rgba(255,0,110,0.18); animation: flashOut 0.3s ease-out forwards; }
        #flash.good { background: rgba(6,214,160,0.12);  animation: flashOut 0.3s ease-out forwards; }
        @keyframes flashOut { 0% { opacity:1; } 100% { opacity:0; } }
    </style>
</head>
<body>

<div id="bg-grid"></div>
<div id="scanlines"></div>
<div id="vignette"></div>

<div id="game-screen">
    <div id="flash"></div>

    <div id="hud">
        <div class="hud-block">
            <div class="hud-label">SCORE</div>
            <div id="score-val">0</div>
        </div>
        <div id="logo">LEXICON<br>BLASTER</div>
        <div class="hud-block">
            <div class="hud-label">COMBO</div>
            <div id="combo-val">×1</div>
        </div>
        <div class="hud-block">
            <div class="hud-label">LIVES</div>
            <div id="life-val">❤️❤️❤️❤️❤️</div>
        </div>
    </div>

    <div id="overlay">
        <div id="overlay-title">MISSION<br>FAILED</div>
        <div class="overlay-stat">FINAL SCORE <span id="final-score">0</span></div>
        <button id="restart-btn" onclick="location.reload()">▶ RETRY</button>
    </div>

    <div id="controller">
        <button class="choice-btn" onclick="checkAnswer(this)">-</button>
        <button class="choice-btn" onclick="checkAnswer(this)">-</button>
        <button class="choice-btn" onclick="checkAnswer(this)">-</button>
        <button class="choice-btn" onclick="checkAnswer(this)">-</button>
    </div>
</div>

let score = 0;
let life = 5;
let combo = 1;
let currentEnemy = null;
let isGameOver = false;
const enemyAreaHeight = window.innerHeight * 0.62;
let drainTime = 8000; // ms enemy stays before hitting bottom

function spawnEnemy() {
    if (isGameOver || currentEnemy) return;

    const data = wordData[Math.floor(Math.random() * wordData.length)];
    const el = document.createElement('div');
    el.className = 'enemy';
    el.style.left = (Math.random() * 64 + 18) + '%';
    el.style.top = '70px';

    const typeClass = data.type === '유의어' ? 'type-syn' : 'type-ant';
    el.innerHTML = `
        <div class="enemy-inner">
            <div class="corner corner-tl"></div>
            <div class="corner corner-tr"></div>
            <div class="corner corner-bl"></div>
            <div class="corner corner-br"></div>
            <div class="enemy-box">
                <span class="target-type ${typeClass}">${data.type}</span>
                <span class="target-word">${data.q}</span>
                <div class="enemy-bar-wrap">
                    <div class="enemy-bar" style="animation-duration:${drainTime}ms"></div>
                </div>
            </div>
        </div>`;

    document.getElementById('game-screen').appendChild(el);

    const choices = [data.ans, ...data.wrong].sort(() => Math.random() - 0.5);
    const btns = document.querySelectorAll('.choice-btn');
    btns.forEach((btn, i) => {
        btn.textContent = choices[i];
        btn.className = 'choice-btn';
        btn.disabled = false;
    });

    const speed = 1.0 + (score / 500);
    currentEnemy = { el, data, y: 70, speed };
    drainTime = Math.max(4000, 9000 - score * 8);
}

function update() {
    if (isGameOver) return;
    if (currentEnemy) {
        currentEnemy.y += currentEnemy.speed;
        currentEnemy.el.style.top = currentEnemy.y + 'px';
        if (currentEnemy.y > enemyAreaHeight) {
            removeEnemy(false);
            takeDamage();
        }
    } else {
        spawnEnemy();
    }
    requestAnimationFrame(update);
}

function checkAnswer(btn) {
    if (!currentEnemy || isGameOver) return;
    if (btn.textContent === currentEnemy.data.ans) {
        combo++;
        const pts = 20 * Math.min(combo, 5);
        score += pts;
        btn.classList.add('correct');
        spawnFloatScore('+' + pts, currentEnemy.el);
        spawnParticles(currentEnemy.el, '#06d6a0');
        flashScreen('good');
        removeEnemy(true);
        updateHUD();
    } else {
        combo = 1;
        btn.classList.add('wrong');
        flashScreen('red');
        takeDamage();
    }
    updateHUD();
}

function takeDamage() {
    life--;
    updateHUD();
    if (life <= 0) {
        gameOver();
    } else if (currentEnemy) {
        removeEnemy(false);
    }
}

function removeEnemy(isSuccess) {
    if (!currentEnemy) return;
    const tempEl = currentEnemy.el;
    if (isSuccess) {
        tempEl.style.transition = '0.3s all cubic-bezier(0.4,0,0.2,1)';
        tempEl.style.transform = 'translateX(-50%) scale(1.15)';
        tempEl.style.opacity = '0';
        setTimeout(() => tempEl.remove(), 300);
    } else {
        tempEl.remove();
    }
    currentEnemy = null;
}

function updateHUD() {
    document.getElementById('score-val').textContent = score;
    document.getElementById('life-val').textContent = life > 0 ? '❤️'.repeat(life) : '💔';
    document.getElementById('combo-val').textContent = combo > 1 ? `×${combo}` : '×1';
}

function flashScreen(cls) {
    const f = document.getElementById('flash');
    f.className = '';
    void f.offsetWidth; // reflow
    f.className = cls;
}

function spawnParticles(enemyEl, color) {
    const rect = enemyEl.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const gs = document.getElementById('game-screen');
    for (let i = 0; i < 10; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = cx + 'px';
        p.style.top = cy + 'px';
        p.style.background = color;
        const angle = (Math.random() * 360) * Math.PI / 180;
        const dist = 30 + Math.random() * 60;
        p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
        p.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
        p.style.animationDelay = (Math.random() * 0.1) + 's';
        gs.appendChild(p);
        setTimeout(() => p.remove(), 800);
    }
}

function spawnFloatScore(text, enemyEl) {
    const rect = enemyEl.getBoundingClientRect();
    const el = document.createElement('div');
    el.className = 'float-score';
    el.textContent = text;
    el.style.left = (rect.left + rect.width / 2) + 'px';
    el.style.top = (rect.top - 10) + 'px';
    document.getElementById('game-screen').appendChild(el);
    setTimeout(() => el.remove(), 900);
}

function gameOver() {
    isGameOver = true;
    document.getElementById('overlay').style.display = 'flex';
    document.getElementById('final-score').textContent = score;
    if (currentEnemy) currentEnemy.el.remove();
}

updateHUD();
update();
